<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SpotCheckPremium Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; margin:20px; background:#f6f8fb; color:#111 }
    .card { background:#fff; padding:12px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.06); margin-bottom:12px }
    input, select { padding:8px; margin-right:8px; }
    button { padding:8px 12px; background:#2b6cb0; color:#fff; border:none; border-radius:6px; cursor:pointer }
    pre { white-space:pre-wrap; max-height:300px; overflow:auto; background:#f0f4f8; padding:10px; border-radius:6px }
  </style>
</head>
<body>
  <h1>SpotCheckPremium â€” Dashboard (Demo)</h1>

  <div class="card">
    <h3>Teacher Login (demo)</h3>
    <input id="loginUser" placeholder="username" value="teacher@braintrain.com" />
    <input id="loginPass" type="password" placeholder="password" value="Teach@123" />
    <button onclick="login()">Login</button>
    <div id="loginResult"></div>
  </div>

  <div class="card">
    <h3>Add School</h3>
    <input id="schoolName" placeholder="School name" />
    <button onclick="addSchool()">Add</button>
    <pre id="schools"></pre>
  </div>

  <div class="card">
    <h3>Add Student</h3>
    <input id="studentName" placeholder="Student name" />
    <input id="studentSchoolId" placeholder="School ID (number)" />
    <button onclick="addStudent()">Add</button>
    <pre id="students"></pre>
  </div>

  <div class="card">
    <h3>Daily Report</h3>
    <button onclick="getReport(false)">Structured</button>
    <button onclick="getReport(true)">AI Summary (requires OPENAI_API_KEY on server)</button>
    <pre id="reportArea"></pre>
  </div>

  <div class="card">
    <h3>Utility</h3>
    <button onclick="loadDemo()">Load Demo Data</button>
    <button onclick="simulateViolation()">Simulate Violation</button>
    <div id="utilResult"></div>
  </div>

<script>
let token = "";

async function login(){
  const user=document.getElementById('loginUser').value;
  const pass=document.getElementById('loginPass').value;
  const res = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
  const j = await res.json();
  if (j.token){ token=j.token; document.getElementById('loginResult').textContent="Logged in (demo)"; loadLists(); } else { document.getElementById('loginResult').textContent=JSON.stringify(j); }
}

async function addSchool(){
  const name = document.getElementById('schoolName').value;
  const res = await fetch('/api/add_school',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
  document.getElementById('schools').textContent = JSON.stringify(await res.json(),null,2);
  loadLists();
}
async function addStudent(){
  const name = document.getElementById('studentName').value;
  const schoolId = parseInt(document.getElementById('studentSchoolId').value || "0");
  const res = await fetch('/api/add_student',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name, schoolId})});
  document.getElementById('students').textContent = JSON.stringify(await res.json(),null,2);
  loadLists();
}
async function loadLists(){
  const s1 = await fetch('/api/list_schools').then(r=>r.json());
  document.getElementById('schools').textContent = JSON.stringify(s1,null,2);
  const s2 = await fetch('/api/list_students').then(r=>r.json());
  document.getElementById('students').textContent = JSON.stringify(s2,null,2);
}
async function getReport(ai){
  const q = ai ? '?ai=true' : '';
  const res = await fetch('/api/daily_report' + q).then(r=>r.json());
  document.getElementById('reportArea').textContent = JSON.stringify(res,null,2);
}
async function loadDemo(){
  const res = await fetch('/api/load_demo',{method:'POST'}).then(r=>r.json());
  document.getElementById('utilResult').textContent = res.message;
  loadLists();
}
async function simulateViolation(){
  const s = await fetch('/api/list_students').then(r=>r.json());
  if (!s[0]){ alert("No students; load demo first"); return; }
  const payload = { studentName: s[0].name, process: "chrome.exe", windowTitle: "YouTube - music", idleSeconds: 120, timestamp: new Date().toISOString(), type: "off-task" };
  const r = await fetch('/api/violation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  document.getElementById('utilResult').textContent = "Simulated: " + JSON.stringify(await r.json());
  getReport(false);
}

window.onload = loadLists;
</script>
</body>
</html>
